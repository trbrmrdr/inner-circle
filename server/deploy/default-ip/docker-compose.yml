name: ${COMPOSE_PROJECT_NAME:-innercircle}

services:
  innercircle-server:
    build:
      context: ${REMOTE_DIR:-/opt/server.inner-circle}
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-innercircle}-server
    restart: unless-stopped
    env_file:
      - ${REMOTE_DIR:-/opt/server.inner-circle}/.env
    expose:
      - "4100"
    volumes:
      - ${REMOTE_DIR:-/opt/server.inner-circle}/private:/app/private
      - ${REMOTE_DIR:-/opt/server.inner-circle}/tmp:/app/tmp
      - ${REMOTE_DIR:-/opt/server.inner-circle}/scripts/media:/app/scripts/media:ro

  caddy:
    image: caddy:2.8-alpine
    container_name: ${CONTAINER_PREFIX:-innercircle}-caddy
    restart: unless-stopped
    depends_on:
      - innercircle-server
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${REMOTE_DIR:-/opt/server.inner-circle}/deploy/default-ip/Caddyfile:/etc/caddy/Caddyfile:ro
      - innercircle_caddy_data:/data
      - innercircle_caddy_config:/config

volumes:
  innercircle_caddy_data:
  innercircle_caddy_config:
